<script>
  const SPARK = '<svg class="spark" viewBox="0 0 24 24" fill="currentColor" style="TOP"><path d="M12 0c.6 5.4 2.6 7.4 12 12-9.4 4.6-11.4 6.6-12 12-.6-5.4-2.6-7.4-12-12 9.4-4.6 11.4-6.6 12-12z"/></svg>';
  const VERIF = '<svg class="vf" viewBox="0 0 24 24"><path fill="#3897f0" d="M12 1l2.4 2.1 3.2-.3 1.3 2.9 2.9 1.3-.3 3.2L24 12l-2.1 2.4.3 3.2-2.9 1.3-1.3 2.9-3.2-.3L12 23l-2.4-2.1-3.2.3-1.3-2.9L2.2 17l.3-3.2L0 12l2.1-2.4-.3-3.2 2.9-1.3L6 2.2l3.2.3z"/><path fill="#fff" d="M10.6 14.6l-2.5-2.5-1.4 1.4 3.9 3.9 7-7-1.4-1.4z"/></svg>';
  const SWIPE = '<svg class="swipe" viewBox="0 0 60 30" fill="none" stroke="#eb4511" stroke-width="3.4" stroke-linecap="round" stroke-linejoin="round"><path d="M4 21 C 18 21, 30 17, 44 9"/><path d="M35 7 L46 8 L42 19"/></svg>';
  const LOGO = '<svg viewBox="0 0 48 48" fill="none"><path d="M24 9 41 39H30L24 28 18 39H7Z" fill="#efe9db"/><path d="M24 9 30 21 24 30 18 21Z" fill="#eb4511"/></svg>';
  const LOGO_DARK = '<svg viewBox="0 0 48 48" fill="none"><path d="M24 9 41 39H30L24 28 18 39H7Z" fill="#16130d"/><path d="M24 9 30 21 24 30 18 21Z" fill="#eb4511"/></svg>';

  /* Clay-Joe poses. The cover always points up at the headline; every
     other slide auto-rotates through this set (poses face the content,
     which sits to Joe's left). Do not hand-assign poses per slide. */
  const COVER_POSE = 'joe-point-trim.png';
  const POSE_CYCLE = ['joe-present-trim.png','joe-pointleft-trim.png','joe-thumb-trim.png'];

  /* ==========================================================
     EDIT ZONE — this is the ONLY thing you change per carousel.
     ----------------------------------------------------------
     Each slide object:
       cover : true   -> first slide (big headline, points up)
       outro : true   -> last slide  (CTA / comment slide)
       kicker: short orange mono label (e.g. 'MOVE 01')
       hl    : headline. Wrap punch words in <span class="o">..</span>
               to make them orange. Auto-uppercased.
       sub   : Recoleta serif sub-line. Wrap key phrase in <b>..</b>.
       term  : terminal lines, each [cls, symbol, strong, text]
               cls: 'c' orange cmd | 'a' dim arrow | 'ok' green check
               strong: 'strong' = white bold text, '' = normal
               keep text <= 38 chars (mono lines do not wrap)
     Slide number + total and the Joe pose are automatic.
     ========================================================== */
  const slidesData = [
    { cover:true, kicker:'BUYER’S CONSULTATION',
      hl:'Only 4-6% of buyers buy the first home. <span class="o">5 moves win the deal.</span>',
      sub:'The buyer’s consultation is where the deal is really won. <b>This is the 5-part framework.</b>',
      term:[
        ['c','$ ','','hpa --buyer-consult'],
        ['a','→ ','','loading 5-part framework'],
        ['a','→ ','','refined across 1,000+ agents'],
        ['ok','✓ ','strong','the consult that closes'] ] },

    { kicker:'MOVE 01',
      hl:'Set the <span class="o">agenda</span>',
      sub:'Open every call by framing <b>how the process works.</b>',
      term:[
        ['c','$ ','','move-01 --set-agenda'],
        ['a','→ ','','how the process works'],
        ['a','→ ','','what happens at each step'],
        ['a','→ ','','your role, and mine'],
        ['ok','✓ ','strong','timeline + next steps'] ] },

    { kicker:'MOVE 02',
      hl:'Ask every <span class="o">angle</span>',
      sub:'Cover who, what, where, when, why — <b>and how.</b>',
      term:[
        ['c','$ ','','move-02 --discovery'],
        ['a','→ ','','who / what / where'],
        ['a','→ ','','when / why'],
        ['a','→ ','','the motivation behind it'],
        ['ok','✓ ','strong','how — where trust is built'] ] },

    { kicker:'MOVE 03',
      hl:'Walk the <span class="o">process</span>',
      sub:'Show financing, inspections and contracts <b>up front.</b>',
      term:[
        ['c','$ ','','move-03 --walk'],
        ['a','→ ','','financing: the real budget'],
        ['a','→ ','','inspections: know the home'],
        ['a','→ ','','timelines: know the pace'],
        ['ok','✓ ','strong','contracts: know the terms'] ] },

    { kicker:'MOVE 04',
      hl:'Show your <span class="o">tools</span>',
      sub:'The alerts, the portal, the <b>direct line to you.</b>',
      term:[
        ['c','$ ','','move-04 --toolkit'],
        ['a','→ ','','instant property alerts'],
        ['a','→ ','','private client portal'],
        ['a','→ ','','offer-ready paperwork'],
        ['ok','✓ ','strong','a direct line to me'] ] },

    { kicker:'MOVE 05',
      hl:'Own the <span class="o">market</span>',
      sub:'List-to-sell, days on market, <b>where prices head.</b>',
      term:[
        ['c','$ ','','move-05 --market'],
        ['a','→ ','','list-to-sell ratio'],
        ['a','→ ','','days on market'],
        ['a','→ ','','active vs sold inventory'],
        ['ok','✓ ','strong','where prices head next'] ] },

    { kicker:'YOUR NEXT MOVE', outro:true,
      hl:'Want the full <span class="o">framework?</span>',
      sub:'Comment <b>“FRAMEWORK”</b> and I’ll send you the full breakdown.',
      term:[
        ['c','$ ','','framework --unlock'],
        ['ok','✓ ','','set the agenda'],
        ['ok','✓ ','','ask every angle'],
        ['ok','✓ ','','walk the process'],
        ['ok','✓ ','','show your tools'],
        ['ok','✓ ','strong','own the market'] ] }
  ];
  /* ===================== END EDIT ZONE ===================== */

  const track = document.getElementById('track');

  const TOTAL = String(slidesData.length).padStart(2,'0');

  slidesData.forEach((d,i) => {
    const s = document.createElement('div');
    s.className = 'slide' + (d.cover ? ' cover' : '') + (d.outro ? ' outro' : '');

    const count = String(i+1).padStart(2,'0');
    const pose  = d.cover ? COVER_POSE : POSE_CYCLE[(i-1) % POSE_CYCLE.length];

    const termLines = d.term.map(([cls,sym,strong,txt]) => {
      const t = strong ? '<strong>'+txt+'</strong>' : txt;
      return '<div class="ln"><span class="'+cls+'">'+sym+'</span>'+t+'</div>';
    }).join('');

    // vertical rhythm (fallback values; refined by layout() after fonts load)
    const subTop  = d.cover ? 268 : 150;
    const sparkTop= d.cover ? 318 : 196;
    const termTop = d.cover ? 344 : 224;

    s.innerHTML =
      '<div class="pcb"></div>'+
      '<div class="wash"></div>'+
      '<div class="content">'+
        '<div class="topbar">'+
          '<span class="brand">'+LOGO_DARK+'</span>'+
          '<span class="count"><b>'+count+'</b> / '+TOTAL+'</span>'+
        '</div>'+
        '<div class="kicker">'+d.kicker+'</div>'+
        '<h2 class="hl">'+d.hl.toUpperCase().replace('CLASS="O"','class="o"')+'</h2>'+
        '<p class="sub" style="top:'+subTop+'px">'+d.sub+'</p>'+
        SPARK.replace('TOP','top:'+sparkTop+'px')+
        '<div class="term" style="top:'+termTop+'px"><div class="bar">'+
          '<i class="r"></i><i class="y"></i><i class="g"></i>'+
          '<span>hpa — zsh</span></div>'+
          '<div class="body">'+termLines+'</div></div>'+
        '<img class="joe" src="carousel-assets/'+pose+'" alt="">'+
        '<div class="wm">@highperformanceagents</div>'+
        '<div class="foot"><span class="av"><img src="carousel-assets/hpa-logo.png" alt=""></span>'+
          '<span class="fname">highperformanceagents</span>'+VERIF+'</div>'+
        SWIPE+
        '<span class="brk tl"></span><span class="brk bl"></span><span class="brk br"></span>'+
      '</div>';
    track.appendChild(s);
  });

  const slides = [...track.children];
  const total  = slides.length;
  const SLIDE_W = 432;

  // Flow sub / sparkle / terminal below the actual rendered headline so
  // 1-line and 2-line headlines never collide with the sub copy.
  function layout(){
    slides.forEach(s=>{
      const cover = s.classList.contains('cover');
      const hl    = s.querySelector('.hl');
      const sub   = s.querySelector('.sub');
      const spark = s.querySelector('.spark');
      const term  = s.querySelector('.term');
      if(!hl||!sub||!spark||!term) return;
      const hlTop  = cover ? 80 : 84;
      const subTop = hlTop + hl.offsetHeight + (cover ? 22 : 20);
      sub.style.top = subTop + 'px';
      const sparkTop = subTop + sub.offsetHeight + 15;
      spark.style.top = sparkTop + 'px';
      let termTop = sparkTop + 30;
      // never let the card run into the footer
      const maxBot = 482;
      if(termTop + term.offsetHeight > maxBot){
        termTop = Math.max(sparkTop + 22, maxBot - term.offsetHeight);
      }
      term.style.top = termTop + 'px';
    });
  }
  if(document.fonts && document.fonts.ready){ document.fonts.ready.then(layout); }
  setTimeout(layout, 400);
  setTimeout(layout, 1200);
  const dotsWrap= document.getElementById('dots');
  const prev = document.getElementById('prev');
  const next = document.getElementById('next');
  let index = 0;

  slides.forEach((_,i)=>{
    const b=document.createElement('button');
    b.className='dot'+(i===0?' on':'');
    b.addEventListener('click',()=>goTo(i));
    dotsWrap.appendChild(b);
  });
  const dots=[...dotsWrap.children];

  function goTo(i){
    index=Math.max(0,Math.min(total-1,i));
    track.style.transform='translateX('+(-index*SLIDE_W)+'px)';
    dots.forEach((d,n)=>d.classList.toggle('on',n===index));
    prev.classList.toggle('hidden',index===0);
    next.classList.toggle('hidden',index===total-1);
  }
  prev.addEventListener('click',()=>goTo(index-1));
  next.addEventListener('click',()=>goTo(index+1));
  document.addEventListener('keydown',e=>{
    if(e.key==='ArrowLeft')goTo(index-1);
    if(e.key==='ArrowRight')goTo(index+1);
  });
  let sx=0;
  track.addEventListener('pointerdown',e=>sx=e.clientX);
  track.addEventListener('pointerup',e=>{
    const dx=e.clientX-sx;
    if(dx<-45)goTo(index+1);
    if(dx>45)goTo(index-1);
  });
  goTo(0);
</script>
</body>
</html>
